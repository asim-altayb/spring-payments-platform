spring:
  application:
    name: spring-payments-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payments}
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:01234567890123456789012345678901}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  shutdown: graceful

payments:
  webhook-secret: ${WEBHOOK_SECRET:local-development-webhook-secret}

