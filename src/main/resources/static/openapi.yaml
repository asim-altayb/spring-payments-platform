openapi: 3.1.0
info:
  title: Spring Payments Platform
  version: 0.1.0
  description: Idempotent account-to-account transfers backed by an immutable double-entry ledger.
paths:
  /api/v1/accounts:
    post:
      summary: Open an account
      security: [{ bearerAuth: [accounts:write] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [externalReference, currency, openingBalance]
              properties:
                externalReference: { type: string }
                currency: { type: string, pattern: "^[A-Z]{3}$" }
                openingBalance: { type: number, minimum: 0 }
      responses:
        "201": { description: Account opened }
  /api/v1/accounts/{id}:
    get:
      summary: Read the current materialized balance
      security: [{ bearerAuth: [accounts:read] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Account found }
        "404": { description: Account not found }
  /api/v1/transfers:
    post:
      summary: Execute an account transfer
      security: [{ bearerAuth: [transfers:write] }]
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema: { type: string, minLength: 8, maxLength: 200 }
      responses:
        "201": { description: Completed or previously completed transfer }
        "401": { description: Missing or invalid bearer token }
        "422": { description: Domain rule rejected the transfer }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
